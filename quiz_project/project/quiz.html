<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title> GK Quiz App</title>
  <link rel="icon" href="favi.webp">
  <link rel="stylesheet" href="quiz.css">
</head>
<body>
  <h1>Quiz Application</h1>

  <div id="timer">Time left: 50s</div>

  <div class="question">
    <p>1. What is the capital of France?</p>
    <input type="radio" name="q1" value="Paris"> Paris<br>
    <input type="radio" name="q1" value="London"> London<br>
    <input type="radio" name="q1" value="Berlin"> Berlin<br>
  </div>

  <div class="question">
    <p>2. Which planet is known as the Red Planet?</p>
    <input type="radio" name="q2" value="Mars"> Mars<br>
    <input type="radio" name="q2" value="Venus"> Venus<br>
    <input type="radio" name="q2" value="Jupiter"> Jupiter<br>
  </div>

  <div class="question">
    <p>3. Who wrote "Hamlet"?</p>
    <input type="radio" name="q3" value="Shakespeare"> Shakespeare<br>
    <input type="radio" name="q3" value="Charles Dickens"> Charles Dickens<br>
    <input type="radio" name="q3" value="Mark Twain"> Mark Twain<br>
  </div>

  <button onclick="submitQuiz()">Submit Quiz</button>

  <p id="score"></p>

  <script src="quiz.js"></script>
</body>
</html>
